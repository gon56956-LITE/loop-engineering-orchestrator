version: workflow-contract/v1
title: 是否适合使用 Loop Engineering Orchestrator
summary: 先判断任务复杂度，再确认目标、资料边界和风险是否足以启动。
scope:
  in:
  - 判断当前任务是否需要 loop-engineering-orchestrator
  - 确认启动前必须知道的边界
  out:
  - 不展开具体 Wave 执行流程
actors:
- id: user
  label: 用户
  type: person
- id: codex
  label: Codex
  type: system
artifacts:
- id: task-request
  label: 任务需求
  type: input
- id: source-boundaries
  label: 资料与限制
  type: document
- id: loop-plan
  label: 启动决定
  type: decision_record
nodes:
- id: start
  label: 提出任务
  type: start
  actor: user
  inputs: []
  outputs:
  - task-request
- id: describe-goal
  label: 说明目标、资料和限制
  type: task
  actor: user
  inputs:
  - task-request
  outputs: []
- id: complexity-check
  label: 任务是否长、复杂或证据很多？
  type: decision
  actor: codex
  inputs: []
  outputs: []
- id: simple-task
  label: 直接单线程处理
  type: end
  actor: codex
  inputs: []
  outputs: []
- id: boundary-check
  label: 目标、资料和风险是否清楚？
  type: decision
  actor: codex
  inputs: []
  outputs: []
- id: ask-basics
  label: 补充关键资料或限制
  type: task
  actor: user
  inputs: []
  outputs:
  - source-boundaries
- id: choose-loop
  label: 启动 Loop Engineering
  type: task
  actor: codex
  inputs:
  - task-request
  - source-boundaries
  outputs:
  - loop-plan
- id: ready
  label: 进入可追踪工作流
  type: end
  actor: codex
  inputs:
  - loop-plan
  outputs: []
edges:
- id: start-to-describe-goal
  from: start
  to: describe-goal
  type: sequence
- id: describe-goal-to-complexity-check
  from: describe-goal
  to: complexity-check
  type: sequence
- id: complexity-check-to-simple-task
  from: complexity-check
  to: simple-task
  type: conditional
  condition: 否
- id: complexity-check-to-boundary-check
  from: complexity-check
  to: boundary-check
  type: conditional
  condition: 是
- id: boundary-check-to-ask-basics
  from: boundary-check
  to: ask-basics
  type: conditional
  condition: 不清楚
- id: ask-basics-to-choose-loop
  from: ask-basics
  to: choose-loop
  type: sequence
- id: boundary-check-to-choose-loop
  from: boundary-check
  to: choose-loop
  type: conditional
  condition: 清楚
- id: choose-loop-to-ready
  from: choose-loop
  to: ready
  type: sequence
constraints:
- id: do-not-use-for-simple-work
  label: 简单短任务无需启动完整循环
  applies_to:
  - simple-task
assumptions:
- 由 Codex 根据任务长度、耦合度、风险和证据量综合判断复杂度。
open_questions: []
