version: workflow-contract/v1
title: 一个通用 Wave Loop 的内部流程
summary: 展开任意 Wave 内部从分派、依赖协调、执行、滚动审查、原 owner 返工到 Gate 和交接的流程。
scope:
  in:
  - 展示单个 Wave 的完整闭环
  - 展示执行 agents、review agents、dependency-coordinator 和 handoff-steward 的分工
  out:
  - 不区分 Wave0、WaveN 或 Output Synthesis Wave 的具体工作内容
actors:
- id: main-agent
  label: 主 agent
  type: system
- id: workers
  label: 执行 agents
  type: system
- id: reviewers
  label: Review agents
  type: system
- id: coordinator
  label: Dependency coordinator
  type: system
- id: handoff
  label: Handoff steward
  type: system
artifacts:
- id: wave-brief
  label: Wave brief
  type: document
- id: work-packets
  label: 工作包
  type: document
- id: review-findings
  label: 审查意见
  type: decision_record
- id: accepted-artifacts
  label: 已接受成果
  type: output
nodes:
- id: start
  label: Wave brief 已确认
  type: start
  actor: main-agent
  inputs:
  - wave-brief
  outputs: []
- id: assign-work
  label: 分派执行、审查和返工 owner
  type: task
  actor: main-agent
  inputs:
  - wave-brief
  outputs:
  - work-packets
- id: coordinate-dependencies
  label: 协调跨 agent 依赖和共享约定
  type: task
  actor: coordinator
  inputs:
  - work-packets
  outputs: []
- id: execute-packet
  label: 执行 agent 完成一个工作包
  type: task
  actor: workers
  inputs:
  - work-packets
  outputs: []
- id: rolling-review
  label: 工作包完成后立即独立审查
  type: task
  actor: reviewers
  inputs: []
  outputs:
  - review-findings
- id: review-result
  label: 这个工作包通过吗？
  type: decision
  actor: reviewers
  inputs:
  - review-findings
  outputs: []
- id: owner-rework
  label: 原 owner 按意见返工
  type: task
  actor: workers
  inputs:
  - review-findings
  outputs: []
- id: record-accepted
  label: 记录已接受成果和证据链
  type: task
  actor: main-agent
  inputs: []
  outputs:
  - accepted-artifacts
- id: all-packets-accepted
  label: 本 Wave 的工作包都已处理？
  type: decision
  actor: main-agent
  inputs:
  - accepted-artifacts
  outputs: []
- id: wave-gate
  label: Wave Gate 统一裁决
  type: task
  actor: main-agent
  inputs:
  - accepted-artifacts
  outputs: []
- id: handoff-update
  label: 更新 handoff 和下一步
  type: task
  actor: handoff
  inputs: []
  outputs: []
- id: finish
  label: Wave 完成并进入后续流程
  type: end
  actor: main-agent
  inputs: []
  outputs: []
edges:
- id: start-to-assign-work
  from: start
  to: assign-work
  type: sequence
- id: assign-work-to-coordinate-dependencies
  from: assign-work
  to: coordinate-dependencies
  type: sequence
- id: coordinate-dependencies-to-execute-packet
  from: coordinate-dependencies
  to: execute-packet
  type: sequence
- id: execute-packet-to-rolling-review
  from: execute-packet
  to: rolling-review
  type: sequence
- id: rolling-review-to-review-result
  from: rolling-review
  to: review-result
  type: sequence
- id: review-result-to-owner-rework
  from: review-result
  to: owner-rework
  type: conditional
  condition: 需返工
- id: owner-rework-to-rolling-review
  from: owner-rework
  to: rolling-review
  type: sequence
- id: review-result-to-record-accepted
  from: review-result
  to: record-accepted
  type: conditional
  condition: 通过
- id: record-accepted-to-all-packets-accepted
  from: record-accepted
  to: all-packets-accepted
  type: sequence
- id: all-packets-accepted-to-coordinate-dependencies
  from: all-packets-accepted
  to: coordinate-dependencies
  type: conditional
  condition: 否
- id: all-packets-accepted-to-wave-gate
  from: all-packets-accepted
  to: wave-gate
  type: conditional
  condition: 是
- id: wave-gate-to-handoff-update
  from: wave-gate
  to: handoff-update
  type: sequence
- id: handoff-update-to-finish
  from: handoff-update
  to: finish
  type: sequence
constraints:
- id: rolling-review-rule
  label: 每个可审查工作包一完成就进入 review，不等待所有执行 agents 一起结束。
  applies_to:
  - rolling-review
- id: owner-preserving-rework
  label: 返工回到原 owner，主 agent 不代替执行 agent 修改成果。
  applies_to:
  - owner-rework
- id: main-agent-gate-owner
  label: 主 agent 只负责范围、分派、记录和 Gate 裁决，不亲自承担 Wave 的执行或独立审查。
  applies_to:
  - assign-work
  - record-accepted
  - wave-gate
assumptions:
- 图按单个工作包的流转来表达滚动审查；同一 Wave 中其他执行 agents 可以继续并行工作。
open_questions: []
